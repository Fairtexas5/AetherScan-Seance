<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi CSI 3D Room Map — Chair</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
    </style>
</head>

<body>
    <div style="width:100vw;height:100vh;" id="plot"></div>
    <script src="https://cdn.jsdelivr.net/npm/plotly.js-dist@2.27.0/plotly.min.js"></script>
    <script>
        function rand(a, b) {
            return Math.random() * (b - a) + a;
        }

        function pts(cx, cy, cz, rx, ry, rz, n, intensity, jitter = 0.08) {
            const x = [],
                y = [],
                z = [],
                c = [];
            for (let i = 0; i < n; i++) {
                x.push(cx + rand(-rx, rx));
                y.push(cy + rand(-ry, ry));
                z.push(cz + rand(-rz, rz));
                c.push(Math.min(1, Math.max(0, intensity + rand(-jitter, jitter))));
            }
            return {
                x,
                y,
                z,
                c
            };
        }

        function merge(...arrs) {
            const x = [],
                y = [],
                z = [],
                c = [];
            arrs.forEach(a => {
                x.push(...a.x);
                y.push(...a.y);
                z.push(...a.z);
                c.push(...a.c);
            });
            return {
                x,
                y,
                z,
                c
            };
        }

        // ---- Chair center ----
        const CX = 12,
            CY = 12;

        // 1. SEAT — flat rectangular pad, z=4.2
        const seat = pts(CX, CY, 4.2, 2.2, 1.8, 0.35, 160, 0.62);

        // 2. SEAT EDGE FRONT ROLL (thicker front lip)
        const seatFront = pts(CX, CY + 1.8, 4.0, 2.2, 0.25, 0.45, 60, 0.60);

        // 3. BACKREST — oval/round mesh back, taller than wide, slight tilt back
        // Round shape: scatter inside ellipse
        const bx = [],
            by = [],
            bz = [],
            bc = [];
        for (let i = 0; i < 200; i++) {
            const angle = rand(0, Math.PI * 2);
            const r = Math.sqrt(rand(0, 1));
            const dx = r * Math.cos(angle) * 1.7;
            const dz = r * Math.sin(angle) * 2.0;
            if (dz > -1.8) { // cut bottom of oval
                bx.push(CX + dx);
                by.push(CY - 2.1 + dx * 0.05);
                bz.push(7.5 + dz);
                bc.push(rand(0.40, 0.55));
            }
        }
        const backrest = {
            x: bx,
            y: by,
            z: bz,
            c: bc
        };

        // 4. BACK FRAME — outer ring of backrest
        const bfx = [],
            bfy = [],
            bfz = [],
            bfc = [];
        for (let i = 0; i < 120; i++) {
            const angle = rand(0, Math.PI * 2);
            const dx = Math.cos(angle) * 1.7,
                dz = Math.sin(angle) * 2.0;
            if (dz > -1.8) {
                bfx.push(CX + dx * 1.0);
                bfy.push(CY - 2.1);
                bfz.push(7.5 + dz * 1.0);
                bfc.push(0.45);
            }
        }
        const backFrame = {
            x: bfx,
            y: bfy,
            z: bfz,
            c: bfc
        };

        // 5. ARMRESTS — horizontal pads on each side
        const armL = pts(CX - 2.5, CY - 0.3, 5.8, 0.3, 1.4, 0.18, 60, 0.52);
        const armR = pts(CX + 2.5, CY - 0.3, 5.8, 0.3, 1.4, 0.18, 60, 0.52);

        // 6. ARM SUPPORT TUBES — vertical from seat level to armrest
        const asx = [],
            asy = [],
            asz = [],
            asc = [];
        for (let side of [-2.4, 2.4]) {
            for (let i = 0; i < 40; i++) {
                asx.push(CX + side + rand(-0.15, 0.15));
                asy.push(CY + rand(-0.8, 0.8));
                asz.push(rand(4.2, 5.7));
                asc.push(0.50);
            }
        }
        const armSupport = {
            x: asx,
            y: asy,
            z: asz,
            c: asc
        };

        // 7. BACK UPRIGHTS — two tubes from seat to backrest bottom
        const bux = [],
            buy = [],
            buz = [],
            buc = [];
        for (let side of [-0.9, 0.9]) {
            for (let i = 0; i < 50; i++) {
                bux.push(CX + side + rand(-0.12, 0.12));
                buy.push(CY - 1.9 + rand(-0.1, 0.1));
                buz.push(rand(4.2, 5.8));
                buc.push(0.50);
            }
        }
        const backUprights = {
            x: bux,
            y: buy,
            z: buz,
            c: buc
        };

        // 8. CENTRAL COLUMN — single pedestal, z 0 to 4.2
        const col = pts(CX, CY, 2.1, 0.25, 0.25, 2.1, 80, 0.58);

        // 9. PNEUMATIC CYLINDER (slightly wider mid-section)
        const cyl = pts(CX, CY, 3.2, 0.35, 0.35, 0.8, 50, 0.60);

        // 10. FIVE-STAR BASE — 5 arms radiating at 72° intervals, z ~0.3
        const stx = [],
            sty = [],
            stz = [],
            stc = [];
        for (let i = 0; i < 5; i++) {
            const angle = (i * 72 + 55) * Math.PI / 180;
            const armLen = 2.8;
            for (let t = 0; t < 50; t++) {
                const d = t / 49 * armLen;
                stx.push(CX + Math.cos(angle) * d + rand(-0.15, 0.15));
                sty.push(CY + Math.sin(angle) * d + rand(-0.15, 0.15));
                stz.push(0.3 + rand(-0.15, 0.15));
                stc.push(0.55);
            }
            // Castor wheel at tip
            for (let w = 0; w < 20; w++) {
                stx.push(CX + Math.cos(angle) * armLen + rand(-0.25, 0.25));
                sty.push(CY + Math.sin(angle) * armLen + rand(-0.25, 0.25));
                stz.push(0.2 + rand(-0.15, 0.3));
                stc.push(0.58);
            }
        }
        const starBase = {
            x: stx,
            y: sty,
            z: stz,
            c: stc
        };

        // 11. HOT SPOT — high-intensity zone at seat (person reflection)
        const hot = pts(CX, CY, 4.5, 1.5, 1.2, 0.6, 90, 0.92, 0.05);

        // ---- Room walls (sparse) ----
        const W = 25,
            D = 25,
            H = 13;
        const wx = [],
            wy = [],
            wz = [],
            wc = [];
        // floor
        for (let i = 0; i < 250; i++) {
            wx.push(rand(0, W));
            wy.push(rand(0, D));
            wz.push(0);
            wc.push(0.06);
        }
        // back wall
        for (let i = 0; i < 180; i++) {
            wx.push(rand(0, W));
            wy.push(D);
            wz.push(rand(0, H));
            wc.push(0.06);
        }
        // left wall
        for (let i = 0; i < 180; i++) {
            wx.push(0);
            wy.push(rand(0, D));
            wz.push(rand(0, H));
            wc.push(0.06);
        }
        // right wall
        for (let i = 0; i < 180; i++) {
            wx.push(W);
            wy.push(rand(0, D));
            wz.push(rand(0, H));
            wc.push(0.06);
        }
        const walls = {
            x: wx,
            y: wy,
            z: wz,
            c: wc
        };

        // ---- Ambient RF scatter ----
        const ax = [],
            ay = [],
            az = [],
            ac = [];
        for (let i = 0; i < 350; i++) {
            ax.push(rand(0, W));
            ay.push(rand(0, D));
            az.push(rand(0, H));
            ac.push(rand(0.03, 0.18));
        }
        const amb = {
            x: ax,
            y: ay,
            z: az,
            c: ac
        };

        // ---- Merge chair parts ----
        const chair = merge(seat, seatFront, backrest, backFrame, armL, armR, armSupport, backUprights, col, cyl,
            starBase, hot);

        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const paperBg = isDark ? '#0e0e0e' : '#fff';
        const gridCol = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.13)';
        const tickCol = isDark ? '#ccc' : '#444';

        const traceWall = {
            type: 'scatter3d',
            mode: 'markers',
            x: walls.x,
            y: walls.y,
            z: walls.z,
            marker: {
                size: 2,
                color: walls.c,
                colorscale: 'RdPu',
                cmin: 0,
                cmax: 1,
                opacity: 0.3,
                showscale: false
            },
            name: 'Room boundary',
            hovertemplate: '(%{x:.1f},%{y:.1f},%{z:.1f})<extra>wall</extra>'
        };
        const traceAmb = {
            type: 'scatter3d',
            mode: 'markers',
            x: amb.x,
            y: amb.y,
            z: amb.z,
            marker: {
                size: 2.5,
                color: amb.c,
                colorscale: 'RdPu',
                cmin: 0,
                cmax: 1,
                opacity: 0.2,
                showscale: false
            },
            name: 'RF ambient',
            hovertemplate: '(%{x:.1f},%{y:.1f},%{z:.1f})<extra>ambient</extra>'
        };
        const traceChair = {
            type: 'scatter3d',
            mode: 'markers',
            x: chair.x,
            y: chair.y,
            z: chair.z,
            marker: {
                size: 4.5,
                color: chair.c,
                colorscale: [
                    [0, 'rgb(140,60,190)'],
                    [0.45, 'rgb(210,50,170)'],
                    [0.72, 'rgb(255,110,20)'],
                    [1, 'rgb(255,235,0)']
                ],
                cmin: 0,
                cmax: 1,
                opacity: 0.88,
                colorbar: {
                    title: {
                        text: 'RF intensity',
                        font: {
                            color: tickCol
                        }
                    },
                    tickfont: {
                        color: tickCol
                    },
                    thickness: 13,
                    len: 0.65,
                    x: 1.01
                }
            },
            name: 'Chair (object)',
            hovertemplate: '(%{x:.1f},%{y:.1f},%{z:.1f})<br>RF:%{marker.color:.2f}<extra>chair</extra>'
        };
        const traceTX = {
            type: 'scatter3d',
            mode: 'markers',
            x: [2],
            y: [12],
            z: [7],
            marker: {
                symbol: 'diamond',
                size: 10,
                color: '#00ee44',
                line: {
                    color: '#fff',
                    width: 1
                }
            },
            name: 'TX antenna',
            hovertemplate: 'TX<extra></extra>'
        };

        const layout = {
            paper_bgcolor: paperBg,
            plot_bgcolor: paperBg,
            margin: {
                l: 0,
                r: 60,
                t: 45,
                b: 0
            },
            scene: {
                xaxis: {
                    title: 'X',
                    range: [0, W],
                    gridcolor: gridCol,
                    zerolinecolor: gridCol,
                    tickfont: {
                        color: tickCol
                    },
                    titlefont: {
                        color: tickCol
                    }
                },
                yaxis: {
                    title: 'Y',
                    range: [0, D],
                    gridcolor: gridCol,
                    zerolinecolor: gridCol,
                    tickfont: {
                        color: tickCol
                    },
                    titlefont: {
                        color: tickCol
                    }
                },
                zaxis: {
                    title: 'Z',
                    range: [0, H],
                    gridcolor: gridCol,
                    zerolinecolor: gridCol,
                    tickfont: {
                        color: tickCol
                    },
                    titlefont: {
                        color: tickCol
                    }
                },
                bgcolor: isDark ? '#0a0a0a' : '#f7f7f4',
                camera: {
                    eye: {
                        x: 1.6,
                        y: -1.6,
                        z: 0.9
                    }
                },
                aspectmode: 'manual',
                aspectratio: {
                    x: 1.3,
                    y: 1.3,
                    z: 0.55
                }
            },
            legend: {
                font: {
                    color: tickCol
                },
                bgcolor: 'rgba(0,0,0,0)'
            },
            title: {
                text: 'WiFi CSI 3D room map — chair in centre',
                font: {
                    color: isDark ? '#eee' : '#222',
                    size: 15
                },
                x: 0.5
            }
        };

        Plotly.newPlot('plot', [traceWall, traceAmb, traceChair, traceTX], layout, {
            responsive: true,
            displayModeBar: true
        });
    </script>
</body>

</html>
